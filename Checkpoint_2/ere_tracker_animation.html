const LAT_MIN = 5,  LAT_MAX = 40;
const LON_MIN = 60, LON_MAX = 100;

const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const PAD_L=50, PAD_R=20, PAD_T=20, PAD_B=40;
const PW = W - PAD_L - PAD_R;
const PH = H - PAD_T - PAD_B;

function lonToX(lon) { return PAD_L + (lon - LON_MIN)/(LON_MAX-LON_MIN)*PW; }
function latToY(lat) { return PAD_T + (LAT_MAX - lat)/(LAT_MAX-LAT_MIN)*PH; }

// track colour palette — consistent colour per track_id
const trackColors = {};
function getTrackColor(tid) {
  if (!trackColors[tid]) {
    const hue = (tid * 67 + 120) % 360;
    trackColors[tid] = `hsl(${hue},80%,60%)`;
  }
  return trackColors[tid];
}

// trail storage — last N positions per track
const TRAIL_LEN = 6;
const trails = {};

function drawGrid() {
  ctx.clearRect(0,0,W,H);

  // background
  ctx.fillStyle = '#0a0f1e';
  ctx.fillRect(0,0,W,H);

  // grid lines
  ctx.strokeStyle = '#141e33';
  ctx.lineWidth = 0.5;
  for (let lon=60; lon<=100; lon+=5) {
    const x = lonToX(lon);
    ctx.beginPath(); ctx.moveTo(x,PAD_T); ctx.lineTo(x,PAD_T+PH); ctx.stroke();
  }
  for (let lat=5; lat<=40; lat+=5) {
    const y = latToY(lat);
    ctx.beginPath(); ctx.moveTo(PAD_L,y); ctx.lineTo(PAD_L+PW,y); ctx.stroke();
  }

  // axis labels
  ctx.fillStyle = '#334466';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  for (let lon=60; lon<=100; lon+=10) {
    ctx.fillText(lon+'°E', lonToX(lon), PAD_T+PH+14);
  }
  ctx.textAlign = 'right';
  for (let lat=10; lat<=40; lat+=10) {
    ctx.fillText(lat+'°N', PAD_L-6, latToY(lat)+4);
  }

  // domain border
  ctx.strokeStyle = '#1a2a4a';
  ctx.lineWidth = 1;
  ctx.strokeRect(PAD_L, PAD_T, PW, PH);
}

const COLOR = {
  birth       : '#2af',
  continuation: '#fa4',
  death       : '#f44',
  domain_exit : '#a4f',
};

let frameIdx = 0;
let playing  = false;
let timer    = null;

function drawFrame(idx) {
  const frame = frames[idx];
  drawGrid();

  // update trails
  frame.eres.forEach(e => {
    if (!trails[e.track_id]) trails[e.track_id] = [];
    trails[e.track_id].push({ x: lonToX(e.lon), y: latToY(e.lat) });
    if (trails[e.track_id].length > TRAIL_LEN)
      trails[e.track_id].shift();
  });

  // draw trails
  Object.entries(trails).forEach(([tid, pts]) => {
    if (pts.length < 2) return;
    ctx.strokeStyle = getTrackColor(parseInt(tid));
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    pts.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // draw EREs
  frame.eres.forEach(e => {
    const x = lonToX(e.lon);
    const y = latToY(e.lat);
    const r = Math.max(4, Math.min(18, 3 + e.size * 2.5));
    const col = COLOR[e.event_type] || '#fff';

    // glow
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(x, y, r*2, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // circle sized by ERE size
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();

    // track id label
    ctx.fillStyle = '#fff';
    ctx.font = '8px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(e.track_id, x, y+3);
  });

  // update UI
  document.getElementById('date-display').textContent = frame.date;
  document.getElementById('stats').textContent =
    `EREs: ${frame.eres.length}  |  Active tracks: ${new Set(frame.eres.map(e=>e.track_id)).size}`;
  document.getElementById('progress-bar').style.width =
    (idx / (frames.length-1) * 100) + '%';
}

function step() {
  if (frameIdx >= frames.length - 1) {
    playing = false;
    document.getElementById('btn-play').textContent = '▶ PLAY';
    return;
  }
  frameIdx++;
  drawFrame(frameIdx);
  if (playing) {
    const spd = parseInt(document.getElementById('speed').value);
    timer = setTimeout(step, spd);
  }
}

document.getElementById('btn-play').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('btn-play').textContent = playing ? '⏸ PAUSE' : '▶ PLAY';
  if (playing) step();
  else clearTimeout(timer);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  playing = false;
  clearTimeout(timer);
  frameIdx = 0;
  Object.keys(trails).forEach(k => delete trails[k]);
  document.getElementById('btn-play').textContent = '▶ PLAY';
  drawFrame(0);
});

// initialise
drawFrame(0);
</script>
</body>
</html>
